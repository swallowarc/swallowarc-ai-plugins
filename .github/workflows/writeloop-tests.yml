name: writeloop-tests
on:
  push:
    branches: [main]
    paths: ["plugins/writeloop/**", ".github/workflows/writeloop-tests.yml"]
  pull_request:
    paths: ["plugins/writeloop/**", ".github/workflows/writeloop-tests.yml"]
jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pyyaml regex pytest
      - run: python -m pytest plugins/writeloop/skills/generate/scripts/tests -q
